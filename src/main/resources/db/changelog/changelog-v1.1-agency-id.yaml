databaseChangeLog:
  - changeSet:
      id: 3-add-agency-id-to-factures
      author: dev
      changes:
        - addColumn:
            tableName: factures
            columns:
              - column:
                  name: agency_id
                  type: uuid
                  constraints:
                    nullable: true

