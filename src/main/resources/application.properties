spring.application.name=account

# Webhook
webhook.secret=change-me-in-prod

# R2DBC Configuration (Reactive Database Access)
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/billing
spring.r2dbc.username=admin
spring.r2dbc.password=password
spring.r2dbc.pool.initial-size=10
spring.r2dbc.pool.max-size=50
spring.r2dbc.pool.max-idle-time=30m
spring.r2dbc.pool.max-acquire-time=3s

# Keep JDBC configuration for Liquibase migrations
spring.datasource.url=jdbc:postgresql://localhost:5432/billing
spring.datasource.username=admin
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver





# Désactiver Liquibase (on utilise hibernate.ddl-auto=update)
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/changelog-v1.0-refactoring.yaml
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:init.sql
spring.sql.init.continue-on-error=true

spring.profiles.active=dev

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=furehmitoto@gmail.com
spring.mail.password=fsez ivwg pzzu fjae

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# WebFlux equivalent — spring.servlet.multipart.* above has no effect on the
# Netty/WebFlux stack this app actually runs on. Without this, DataBufferUtils.join
# in KernelMediaAdapter (and any other in-memory body buffering) rejects anything
# over the 256KB default, which real image uploads exceed immediately.
spring.codec.max-in-memory-size=10MB

# --- URL de base de l'application ---
app.base-url=${APP_BASE_URL:http://localhost:8080}

# --- Adresse du serveur Kafka ---
spring.kafka.bootstrap-servers=localhost:9092

# --- Configuration du Producer ---
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# --- Configuration du Consumer ---
spring.kafka.consumer.group-id=my-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.admin.auto-create=true

# --- Cache Configuration (Caffeine) ---
spring.cache.type=caffeine
spring.cache.cache-names=clients,produits,taxes,factures,devis,fournisseurs,banques,stocks,paiements
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# --- Actuator & Metrics ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true
management.metrics.enable.cache=true
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true


